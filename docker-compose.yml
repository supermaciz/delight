services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delight_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d delight_dev"]
      interval: 2s
      timeout: 5s
      retries: 10
  migrate:
    build: .
    command: ["/app/bin/migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@postgres/delight_dev
      SECRET_KEY_BASE: O/RRXINlqJW3Wx7XJWSVwcQlcvWx/+uRY1VT0Zr1rCgxA3CEkOV+ahgGZ3UL+I0o
  delight:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ecto://postgres:postgres@postgres/delight_dev
      PHX_HOST: localhost
      SECRET_KEY_BASE: O/RRXINlqJW3Wx7XJWSVwcQlcvWx/+uRY1VT0Zr1rCgxA3CEkOV+ahgGZ3UL+I0o
